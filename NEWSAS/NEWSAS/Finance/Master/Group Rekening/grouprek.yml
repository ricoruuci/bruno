info:
  name: grouprek
  type: http
  seq: 1

http:
  method: POST
  url: "{{API_URL}}/grouprek"
  body:
    type: json
    data: |-
      {
          "grouprekname" : "cogs",
          "kode" : "1"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
